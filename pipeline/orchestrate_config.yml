  # ---- mart_pipeline_health (BQ-10) — Spark-native, deliberately EXCLUDED from dbt (pipeline
  # run reconciliation metadata, not a BQ analytics aggregation — plan Step-1) ----
  - name: mart_pipeline_health
    module: pipeline.gold.mart_pipeline_health
    cadence: on_upstream
    depends_on: [silver_sales, silver_fraud, silver_crm, silver_marketing, silver_core_banking]

  # ---- Gold table maintenance (ADR-010 decision 2, closes R-41) ----
  - name: compaction
    module: pipeline.gold.compaction
    cadence: on_upstream
    depends_on: [fact_txn, fact_card_fraud, fact_loan_application, fact_crm_case, fact_previous_application, fact_account_balance, bridge_customer_account, fact_repayment_behavior, dim_customer, dim_customer_xwalk, dim_campaign_response, dim_date, dim_fx_rate]
