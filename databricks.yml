# Databricks Asset Bundle — the declarative, git-diffable source of truth for this repo's
# Databricks Job(s). ADR-008 (CI/CD + Infrastructure-as-Code). Replaces the one-off imperative
# `w.jobs.create(...)` SDK call that first stood up the git-sourced Job (2026-07-16) — a bundle
# is version-controlled and reconciled by `databricks bundle deploy`, so there is exactly ONE
# owner of the Job and no click-ops drift.
#
# KEY PROPERTY (ADR-002 Add #6): every task uses `source: GIT` + a bundle-level `git_source`, so
# `bundle deploy` uploads ONLY the Job spec — Databricks pulls `pipeline/**` from the PUBLIC git
# remote itself. The agent/bundle never ships repo code onto the cluster (the harness-BANNED
# code-shipping shape is not re-introduced).
#
# NO `schedule:`/`trigger:` block anywhere here — cadence is owned by the future external
# orchestrator (Airflow, D-10), never by an in-repo scheduler. Enforced by gates/boundary_contract.py.
#
# Auth: host + token come from the DATABRICKS_HOST / DATABRICKS_TOKEN environment (CD: a GitHub
# Environment secret; local: `.env`). No literal host or token lives in this file.

bundle:
  name: banking-lakehouse

variables:
  cluster_id:
    description: >-
      The existing SINGLE_USER cluster the Job runs on (ADR-002 Add #5). A variable, not a
      hardcoded resource, so re-creating the cluster is a one-line override, not a bundle edit
      (D-14 portability — survives the disposable trial being deleted).
    default: 0715-022729-6j0g8jhn
  git_branch:
    description: >-
      Branch Databricks checks out for the git_source Job. Defaults to `main`, which carries the
      proven S3-write fixes + the SystemExit(0) entrypoint guards (ADR-002 Add #6) since
      `feat/salesforce-crm-swap` merged (PR #1, 2026-07-17).
    default: main

resources:
  jobs:
    banking_bronze_silver:
      name: banking-lakehouse-berka-salesforce-bronze-silver
      # Databricks pulls the code itself from the public remote — bundle ships no code.
      git_source:
        git_url: https://github.com/rajeluqman/banking-multisource-lakehouse
        git_provider: gitHub
        git_branch: ${var.git_branch}
      tasks:
        - task_key: promotion_gate_salesforce
          existing_cluster_id: ${var.cluster_id}
          spark_python_task:
            python_file: pipeline/promote/promotion_gate.py
            source: GIT
        - task_key: silver_crm
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: promotion_gate_salesforce
          spark_python_task:
            python_file: pipeline/silver/silver_crm.py
            source: GIT
        - task_key: silver_fraud
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: promotion_gate_salesforce
          spark_python_task:
            python_file: pipeline/silver/silver_fraud.py
            source: GIT
        - task_key: silver_marketing
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: promotion_gate_salesforce
          spark_python_task:
            python_file: pipeline/silver/silver_marketing.py
            source: GIT
        - task_key: silver_sales
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: promotion_gate_salesforce
          spark_python_task:
            python_file: pipeline/silver/silver_sales.py
            source: GIT
        - task_key: silver_core_banking
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: promotion_gate_salesforce
          spark_python_task:
            python_file: pipeline/silver/silver_core_banking.py
            source: GIT

# 2026-07-17: added silver_fraud (PaySim/MSSQL) same session as the first entry below;
# silver_marketing (Teradata/bank_marketing) + silver_sales (Home Credit/Postgres — only
# application/bureau/previous_application are wired into Silver; bureau_balance/POS_CASH_balance/
# credit_card_balance/installments_payments land in Bronze verbatim per ADR-003 D-05 but have no
# Silver transform written for them, pre-existing locked scope, not touched here) added in the
# same session's continuation — cleared by @finops (fresh per-source ceilings: PaySim ~$15/2hr,
# Home Credit $20-25/2.5-3hr after a corrected row-count re-ruling capped bureau_balance/
# installments_payments/POS_CASH_balance at 2M rows each; Teradata's 45,211-row UCI dataset was
# never a cost concern) and @scope-guardian (already-locked ADR-006 scope, no new mart/BQ) same
# session, owner said "run" / asked to parallelize Teradata + Home Credit local prep.
# promotion_gate_salesforce needs no change for any of these — it already loops over all 5
# sources' tables generically (pipeline/promote/promotion_gate.py SOURCE_TABLES), so it picks up
# mssql.paysim_transactions / teradata.bank_marketing / postgres.* automatically once real
# Landing data exists there.
#
# silver_core_banking (OBP — accounts/transactions) added same session, after fixing obp_client.py
# and promotion_gate.py's OBP/cdc branches to actually read/write real S3 instead of a hardcoded
# local-staging path that would have been invisible to the Databricks cluster (2026-07-17). Per
# ADR-005 Add #2, OBP is Silver-terminal by design — no Gold task for it, not an oversight.
#
# This bundle now codifies all 5 sources' proven Landing->Bronze->Silver run. Growing it to the
# full 27-stage canonical run (Gold layer) is a separate decision that must clear @finops
# (metered cluster cost) and @scope-guardian (canonical-ingest scope) first — do not silently
# expand the task list here (ADR-008 §routing).

targets:
  dev:
    mode: development
    default: true
    # workspace.host resolves from the DATABRICKS_HOST env var (no literal host here — ADR-008).
