# Databricks Asset Bundle — the declarative, git-diffable source of truth for this repo's
# Databricks Job(s). ADR-008 (CI/CD + Infrastructure-as-Code). Replaces the one-off imperative
# `w.jobs.create(...)` SDK call that first stood up the git-sourced Job (2026-07-16) — a bundle
# is version-controlled and reconciled by `databricks bundle deploy`, so there is exactly ONE
# owner of the Job and no click-ops drift.
#
# KEY PROPERTY (ADR-002 Add #6): every task uses `source: GIT` + a bundle-level `git_source`, so
# `bundle deploy` uploads ONLY the Job spec — Databricks pulls `pipeline/**` from the PUBLIC git
# remote itself. The agent/bundle never ships repo code onto the cluster (the harness-BANNED
# code-shipping shape is not re-introduced).
#
# NO `schedule:`/`trigger:` block anywhere here — cadence is owned by the future external
# orchestrator (Airflow, D-10), never by an in-repo scheduler. Enforced by gates/boundary_contract.py.
#
# Auth: host + token come from the DATABRICKS_HOST / DATABRICKS_TOKEN environment (CD: a GitHub
# Environment secret; local: `.env`). No literal host or token lives in this file.

bundle:
  name: banking-lakehouse

variables:
  cluster_id:
    description: >-
      The existing SINGLE_USER cluster the Job runs on (ADR-002 Add #5). A variable, not a
      hardcoded resource, so re-creating the cluster is a one-line override, not a bundle edit
      (D-14 portability — survives the disposable trial being deleted).
    default: 0715-022729-6j0g8jhn
  git_branch:
    description: >-
      Branch Databricks checks out for the git_source Job. Defaults to `main`, which carries the
      proven S3-write fixes + the SystemExit(0) entrypoint guards (ADR-002 Add #6) since
      `feat/salesforce-crm-swap` merged (PR #1, 2026-07-17).
    default: main

resources:
  jobs:
    banking_bronze_silver:
      name: banking-lakehouse-berka-salesforce-bronze-silver
      # Databricks pulls the code itself from the public remote — bundle ships no code.
      git_source:
        git_url: https://github.com/rajeluqman/banking-multisource-lakehouse
        git_provider: gitHub
        git_branch: ${var.git_branch}
      tasks:
        - task_key: promotion_gate_salesforce
          existing_cluster_id: ${var.cluster_id}
          spark_python_task:
            python_file: pipeline/promote/promotion_gate.py
            source: GIT
        - task_key: silver_crm
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: promotion_gate_salesforce
          spark_python_task:
            python_file: pipeline/silver/silver_crm.py
            source: GIT
        - task_key: silver_fraud
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: promotion_gate_salesforce
          spark_python_task:
            python_file: pipeline/silver/silver_fraud.py
            source: GIT
        - task_key: silver_marketing
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: promotion_gate_salesforce
          spark_python_task:
            python_file: pipeline/silver/silver_marketing.py
            source: GIT
        - task_key: silver_sales
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: promotion_gate_salesforce
          spark_python_task:
            python_file: pipeline/silver/silver_sales.py
            source: GIT
        - task_key: silver_core_banking
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: promotion_gate_salesforce
          spark_python_task:
            python_file: pipeline/silver/silver_core_banking.py
            source: GIT

        # ---- Silver -> Gold (2026-07-17, ninth session) — cleared @staff-data-engineer
        # (model/schema: code on disk already matches the locked ADR-005 grain table, no
        # drift, no stub/TODO found), @scope-guardian (all 9 marts map 1:1 to BQ-01..10, no
        # OBP anywhere in this graph per ADR-005 Add #2), @finops (Gold reads already-
        # materialized Silver Delta only, no re-extraction, well under the $15-25 per-source
        # Bronze/Silver ceilings). depends_on below mirrors pipeline/orchestrate_config.yml's
        # Gold section EXACTLY (ground truth, not the ADR-007 block-diagram) -- do not
        # simplify this DAG.
        - task_key: dim_customer_xwalk
          existing_cluster_id: ${var.cluster_id}
          spark_python_task:
            python_file: pipeline/gold/dim_customer_xwalk.py
            source: GIT
        - task_key: dim_date
          existing_cluster_id: ${var.cluster_id}
          spark_python_task:
            python_file: pipeline/gold/dim_date.py
            source: GIT
        - task_key: dim_fx_rate
          existing_cluster_id: ${var.cluster_id}
          spark_python_task:
            python_file: pipeline/gold/dim_fx_rate.py
            source: GIT
        - task_key: dq_currency_gate
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: silver_sales
            - task_key: silver_fraud
            - task_key: silver_crm
            - task_key: silver_marketing
            - task_key: silver_core_banking
          spark_python_task:
            python_file: pipeline/gold/dq_currency_gate.py
            source: GIT
        - task_key: dim_customer
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: dim_customer_xwalk
            - task_key: silver_crm
            - task_key: silver_sales
          spark_python_task:
            python_file: pipeline/gold/dim_customer.py
            source: GIT
        - task_key: fact_txn
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: dim_customer_xwalk
            - task_key: dim_fx_rate
            - task_key: dq_currency_gate
            - task_key: silver_fraud
            - task_key: silver_crm
          spark_python_task:
            python_file: pipeline/gold/fact_txn.py
            source: GIT
        - task_key: fact_card_fraud
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: dim_customer_xwalk
            - task_key: dim_fx_rate
            - task_key: dq_currency_gate
            - task_key: silver_fraud
          spark_python_task:
            python_file: pipeline/gold/fact_card_fraud.py
            source: GIT
        - task_key: fact_loan_application
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: dim_customer_xwalk
            - task_key: silver_sales
          spark_python_task:
            python_file: pipeline/gold/fact_loan_application.py
            source: GIT
        # ---- Silver->Gold promotions (ADR-005 Add #4) — dbt serving reads Gold-only ----
        - task_key: dim_campaign_response
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: silver_marketing
          spark_python_task:
            python_file: pipeline/gold/dim_campaign_response.py
            source: GIT
        - task_key: fact_crm_case
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: dim_customer_xwalk
            - task_key: silver_crm
          spark_python_task:
            python_file: pipeline/gold/fact_crm_case.py
            source: GIT
        - task_key: fact_previous_application
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: dim_customer_xwalk
            - task_key: silver_sales
          spark_python_task:
            python_file: pipeline/gold/fact_previous_application.py
            source: GIT
        - task_key: fact_account_balance
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: dim_fx_rate
            - task_key: silver_crm
          spark_python_task:
            python_file: pipeline/gold/fact_account_balance.py
            source: GIT
        - task_key: bridge_customer_account
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: dim_customer_xwalk
            - task_key: silver_crm
          spark_python_task:
            python_file: pipeline/gold/bridge_customer_account.py
            source: GIT
        # 8 analytics-mart tasks (mart_customer_360, mart_cross_sell, mart_daily_flows,
        # mart_dormancy, mart_fraud_daily, mart_fraud_followup, mart_loan_funnel,
        # mart_risk_segment — BQ-01..08) RETIRED from this job 2026-07-18 (PLAN Phase 3,
        # governance/plans/PLAN-dbt-marts-serving-layer.md). dbt now owns sole authoring:
        # Snowflake views over BANKING.GOLD_EXT, dbt/models/marts/*.sql. Reconciled against
        # each builder's last real S3 output before removal — every number matched exactly or
        # within float rounding (PLAN Phase-2 row has the full evidence). Source .py files
        # kept in git history, not deleted, for reversibility.
        - task_key: mart_pipeline_health
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: silver_sales
            - task_key: silver_fraud
            - task_key: silver_crm
            - task_key: silver_marketing
            - task_key: silver_core_banking
          spark_python_task:
            python_file: pipeline/gold/mart_pipeline_health.py
            source: GIT
        # ---- Gold table maintenance (ADR-010 decision 2, closes R-41) ----
        - task_key: compaction
          existing_cluster_id: ${var.cluster_id}
          depends_on:
            - task_key: fact_txn
            - task_key: fact_card_fraud
            - task_key: fact_loan_application
            - task_key: fact_crm_case
            - task_key: fact_previous_application
            - task_key: fact_account_balance
            - task_key: bridge_customer_account
            - task_key: dim_customer
            - task_key: dim_customer_xwalk
            - task_key: dim_campaign_response
            - task_key: dim_date
            - task_key: dim_fx_rate
          spark_python_task:
            python_file: pipeline/gold/compaction.py
            source: GIT

      # @finops condition (2026-07-17 Gold sign-off): explicit hard backstop given this repo
      # has no documented cluster $/hour rate to extrapolate a confident dollar figure from.
      timeout_seconds: 5400  # 90 min

# 2026-07-17: added silver_fraud (PaySim/MSSQL) same session as the first entry below;
# silver_marketing (Teradata/bank_marketing) + silver_sales (Home Credit/Postgres — only
# application/bureau/previous_application are wired into Silver; bureau_balance/POS_CASH_balance/
# credit_card_balance/installments_payments land in Bronze verbatim per ADR-003 D-05 but have no
# Silver transform written for them, pre-existing locked scope, not touched here) added in the
# same session's continuation — cleared by @finops (fresh per-source ceilings: PaySim ~$15/2hr,
# Home Credit $20-25/2.5-3hr after a corrected row-count re-ruling capped bureau_balance/
# installments_payments/POS_CASH_balance at 2M rows each; Teradata's 45,211-row UCI dataset was
# never a cost concern) and @scope-guardian (already-locked ADR-006 scope, no new mart/BQ) same
# session, owner said "run" / asked to parallelize Teradata + Home Credit local prep.
# promotion_gate_salesforce needs no change for any of these — it already loops over all 5
# sources' tables generically (pipeline/promote/promotion_gate.py SOURCE_TABLES), so it picks up
# mssql.paysim_transactions / teradata.bank_marketing / postgres.* automatically once real
# Landing data exists there.
#
# silver_core_banking (OBP — accounts/transactions) added same session, after fixing obp_client.py
# and promotion_gate.py's OBP/cdc branches to actually read/write real S3 instead of a hardcoded
# local-staging path that would have been invisible to the Databricks cluster (2026-07-17). Per
# ADR-005 Add #2, OBP is Silver-terminal by design — no Gold task for it, not an oversight.
#
# This bundle now codifies all 5 sources' proven Landing->Bronze->Silver run PLUS the full Gold
# layer (dims/facts/marts, added 2026-07-17, ninth session): 17 new tasks (3 seed-driven dims +
# dim_customer + dq_currency_gate + 3 facts + 9 BQ-01..10 marts), depends_on graph copied
# verbatim from pipeline/orchestrate_config.yml's Gold section (ground truth over the ADR-007
# block-diagram). Cleared @staff-data-engineer (model/schema: code already matches the locked
# ADR-005 grain table, no drift — see pipeline/gold/dim_customer.py docstring fix same session),
# @scope-guardian (all 9 marts map 1:1 to BQ-01..10, OBP correctly absent from every Gold
# depends_on per ADR-005 Add #2), @finops (Gold reads only already-materialized Silver Delta, no
# re-extraction cost; explicit timeout_seconds backstop added since this repo has no documented
# cluster $/hour rate). Not a silent expansion — all three signed off this session before this
# edit landed (ADR-008 §routing).

targets:
  dev:
    mode: development
    default: true
    # workspace.host resolves from the DATABRICKS_HOST env var (no literal host here — ADR-008).
